      <stop offset="30%" stop-color="#818cf8" stop-opacity="0.15"/>
      <stop offset="70%" stop-color="#818cf8" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
