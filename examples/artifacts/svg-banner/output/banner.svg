<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="100%" height="100%">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e1b4b"/>
      <stop offset="50%" stop-color="#312e81"/>
      <stop offset="100%" stop-color="#1e40af"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="50%" stop-color="#a5b4fc"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>
    <linearGradient id="glow" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#a5b4fc" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#a5b4fc" stop-opacity="0"/>
    </linearGradient>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="800" height="200" fill="url(#bg)" rx="16"/>

  <rect x="0" y="0" width="800" height="100" fill="url(#glow)" rx="16"/>

  <circle cx="680" cy="40" r="2.5" fill="#818cf8" opacity="0.8"/>
  <circle cx="720" cy="80" r="2" fill="#60a5fa" opacity="0.6"/>
  <circle cx="650" cy="90" r="2" fill="#a5b4fc" opacity="0.7"/>
  <circle cx="700" cy="140" r="1.5" fill="#818cf8" opacity="0.5"/>
  <circle cx="740" cy="30" r="2" fill="#60a5fa" opacity="0.7"/>
  <circle cx="120" cy="150" r="2.5" fill="#818cf8" opacity="0.6"/>
  <circle cx="80" cy="50" r="2" fill="#a5b4fc" opacity="0.5"/>
  <circle cx="160" cy="30" r="1.5" fill="#60a5fa" opacity="0.7"/>
  <circle cx="200" cy="160" r="2" fill="#818cf8" opacity="0.5"/>
  <circle cx="300" cy="45" r="2" fill="#a5b4fc" opacity="0.6"/>
  <circle cx="450" cy="160" r="2.5" fill="#818cf8" opacity="0.5"/>
  <circle cx="500" cy="35" r="2" fill="#60a5fa" opacity="0.6"/>

  <g stroke="#818cf8" stroke-width="0.5" fill="none" opacity="0.35">
    <line x1="680" y1="40" x2="720" y2="80"/>
    <line x1="680" y1="40" x2="650" y2="90"/>
    <line x1="720" y1="80" x2="740" y2="30"/>
    <line x1="650" y1="90" x2="700" y2="140"/>
    <line x1="80" y1="50" x2="120" y2="150"/>
    <line x1="80" y1="50" x2="160" y2="30"/>
    <line x1="120" y1="150" x2="200" y2="160"/>
    <line x1="160" y1="30" x2="300" y2="45"/>
    <line x1="300" y1="45" x2="450" y2="160"/>
    <line x1="450" y1="160" x2="500" y2="35"/>
  </g>

  <g stroke="#60a5fa" stroke-width="0.3" fill="none" opacity="0.25">
    <rect x="640" y="25" width="40" height="24" rx="4"/>
    <rect x="648" y="72" width="32" height="20" rx="3"/>
    <rect x="70" y="25" width="30" height="18" rx="3"/>
    <rect x="260" y="30" width="36" height="20" rx="3"/>
    <rect x="430" y="145" width="44" height="24" rx="4"/>
  </g>

  <text x="60" y="108" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="54" font-weight="650" fill="url(#accent)" letter-spacing="-0.025em" filter="url(#softGlow)">FlowForge</text>

  <text x="62" y="143" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="14" font-weight="500" fill="#a5b4fc" opacity="0.75" letter-spacing="0.12em">PROJECT MANAGEMENT</text>

  <g transform="translate(420, 82)" filter="url(#softGlow)">
    <rect x="0" y="0" width="7" height="7" rx="1.5" fill="#818cf8" opacity="0.85"/>
    <rect x="12" y="7" width="5" height="5" rx="1" fill="#60a5fa" opacity="0.75"/>
    <rect x="22" y="0" width="8" height="8" rx="1.5" fill="#a5b4fc" opacity="0.85"/>
    <rect x="35" y="5" width="5" height="5" rx="1" fill="#818cf8" opacity="0.65"/>
    <rect x="45" y="0" width="7" height="7" rx="1.5" fill="#60a5fa" opacity="0.85"/>
    <rect x="0" y="16" width="5" height="5" rx="1" fill="#a5b4fc" opacity="0.55"/>
    <rect x="12" y="18" width="7" height="7" rx="1.5" fill="#818cf8" opacity="0.75"/>
    <rect x="24" y="15" width="4" height="4" rx="1" fill="#60a5fa" opacity="0.65"/>
    <rect x="36" y="18" width="7" height="7" rx="1.5" fill="#a5b4fc" opacity="0.75"/>
  </g>
</svg>