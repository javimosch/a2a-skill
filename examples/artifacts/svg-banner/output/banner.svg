<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="100%" height="100%">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e1b4b"/>
      <stop offset="50%" stop-color="#312e81"/>
      <stop offset="100%" stop-color="#4338ca"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#c7d2fe"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </linearGradient>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="800" height="200" fill="url(#bg)" rx="12"/>
  <rect y="0" width="800" height="80" fill="url(#glow)"/>

  <g stroke="#818cf8" stroke-width="1" fill="none" opacity="0.5">
    <circle cx="60" cy="50" r="3" fill="#818cf8"/>
    <circle cx="60" cy="50" r="8" opacity="0.3"/>
    <line x1="60" y1="50" x2="130" y2="80"/>
    <line x1="60" y1="50" x2="90" y2="130"/>
    <line x1="60" y1="50" x2="35" y2="100"/>
    <circle cx="130" cy="80" r="2" fill="#818cf8"/>
    <line x1="130" y1="80" x2="200" y2="55"/>
    <circle cx="200" cy="55" r="2" fill="#a5b4fc"/>
    <line x1="200" y1="55" x2="270" y2="85"/>
    <line x1="200" y1="55" x2="230" y2="35"/>
    <circle cx="270" cy="85" r="2" fill="#818cf8"/>
    <line x1="270" y1="85" x2="340" y2="60"/>
    <circle cx="340" cy="60" r="2" fill="#a5b4fc"/>
    <line x1="340" y1="60" x2="410" y2="80"/>
    <circle cx="35" cy="100" r="2" fill="#6366f1"/>
    <circle cx="90" cy="130" r="2" fill="#6366f1"/>
    <line x1="35" y1="100" x2="90" y2="130"/>
    <circle cx="90" cy="130" r="6" opacity="0.2"/>
    <line x1="410" y1="80" x2="480" y2="50"/>
    <circle cx="480" cy="50" r="2" fill="#a5b4fc"/>
    <line x1="480" y1="50" x2="550" y2="75"/>
    <circle cx="550" cy="75" r="2" fill="#818cf8"/>
    <line x1="550" y1="75" x2="630" y2="45"/>
    <circle cx="630" cy="45" r="3" fill="#818cf8"/>
    <circle cx="630" cy="45" r="8" opacity="0.3"/>
    <line x1="630" y1="45" x2="720" y2="70"/>
    <line x1="630" y1="45" x2="670" y2="110"/>
    <circle cx="720" cy="70" r="2" fill="#a5b4fc"/>
    <circle cx="670" cy="110" r="2" fill="#6366f1"/>
    <line x1="670" y1="110" x2="720" y2="70"/>
    <circle cx="480" cy="50" r="6" opacity="0.2"/>
    <circle cx="550" cy="75" r="6" opacity="0.2"/>
  </g>

  <g stroke="#a5b4fc" stroke-width="0.5" opacity="0.2">
    <circle cx="180" cy="40" r="12" fill="none"/>
    <circle cx="350" cy="170" r="18" fill="none"/>
    <circle cx="500" cy="160" r="14" fill="none"/>
    <circle cx="680" cy="40" r="16" fill="none"/>
    <circle cx="750" cy="140" r="10" fill="none"/>
  </g>

  <text x="160" y="118" font-family="'SF Pro Display', 'Inter', 'Segoe UI', system-ui, sans-serif" font-size="52" font-weight="700" fill="url(#accent)" filter="url(#softGlow)">FlowForge</text>
  <text x="160" y="145" font-family="'SF Pro Display', 'Inter', 'Segoe UI', system-ui, sans-serif" font-size="14" font-weight="500" fill="#a5b4fc" opacity="0.8" letter-spacing="4">PROJECT MANAGEMENT</text>
  <rect x="160" y="155" width="80" height="3" rx="1.5" fill="#818cf8"/>
</svg>