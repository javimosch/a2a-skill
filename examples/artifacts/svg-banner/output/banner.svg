  <text x="400" y="150" text-anchor="middle" font-family="system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-size="14" font-weight="500" fill="#c7d2fe" letter-spacing="6" opacity="0.9">PROJECT MANAGEMENT PLATFORM</text>
