version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init-db.sh:/docker-entrypoint-initdb.d/init-db.sh
    environment:
      POSTGRES_USER: app_user
      POSTGRES_PASSWORD: "${DB_PASSWORD}"
      POSTGRES_DB: app_db
      PGDATA: /var/lib/postgresql/data/pgdata
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app_user -d app_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - appnet
    restart: unless-stopped

  cache:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD}"]
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - appnet
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: backend
    image: myapp/backend:latest
    ports:
      - "8000:8000"
    environment:
      APP_ENV: "${APP_ENV:-production}"
      DATABASE_URL: "postgresql+asyncpg://app_user:${DB_PASSWORD}@db:5432/app_db"
      REDIS_URL: "redis://:${REDIS_PASSWORD}@cache:6379/0"
      CELERY_BROKER_URL: "redis://:${REDIS_PASSWORD}@cache:6379/1"
      CELERY_RESULT_BACKEND: "redis://:${REDIS_PASSWORD}@cache:6379/2"
      SECRET_KEY: "${SECRET_KEY}"
      ALLOWED_ORIGINS: "http://localhost,http://localhost:80"
    volumes:
      - ./backend:/app
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_healthy
    networks:
      - appnet
    restart: unless-stopped

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: worker
    image: myapp/backend:latest
    command: celery -A app.tasks worker --loglevel=info --concurrency=4
    environment:
      APP_ENV: "${APP_ENV:-production}"
      DATABASE_URL: "postgresql+asyncpg://app_user:${DB_PASSWORD}@db:5432/app_db"
      REDIS_URL: "redis://:${REDIS_PASSWORD}@cache:6379/0"
      CELERY_BROKER_URL: "redis://:${REDIS_PASSWORD}@cache:6379/1"
      CELERY_RESULT_BACKEND: "redis://:${REDIS_PASSWORD}@cache:6379/2"
      SECRET_KEY: "${SECRET_KEY}"
    volumes:
      - ./backend:/app
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.tasks inspect ping || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_healthy
    networks:
      - appnet
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: "${VITE_API_BASE_URL:-http://localhost:8000}"
    container_name: frontend
    ports:
      - "80:80"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - appnet
    restart: unless-stopped

networks:
  appnet:
    driver: bridge

volumes:
  pgdata:
  redisdata: