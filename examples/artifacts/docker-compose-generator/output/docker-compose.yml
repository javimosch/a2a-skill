version: "3.8"

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: frontend:latest
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    environment:
      VITE_API_URL: "http://backend:8000"
      NGINX_PORT: "80"
      NGINX_HOST: "localhost"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    depends_on:
      backend:
        condition: service_started
    networks:
      - app-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: backend:latest
    ports:
      - "8000:8000"
    volumes:
      - ./backend/app:/app
    environment:
      DATABASE_URL: "postgresql+asyncpg://app_user:${DB_PASSWORD:-app_pass}@db:5432/app_db"
      REDIS_URL: "redis://:${REDIS_PASSWORD:-}@cache:6379/0"
      CELERY_BROKER_URL: "redis://:${REDIS_PASSWORD:-}@cache:6379/1"
      CELERY_RESULT_BACKEND: "redis://:${REDIS_PASSWORD:-}@cache:6379/2"
      SECRET_KEY: "${SECRET_KEY:-change-me-in-production}"
      APP_ENV: "${APP_ENV:-production}"
      LOG_LEVEL: "${LOG_LEVEL:-info}"
      CORS_ORIGINS: "${CORS_ORIGINS:-http://localhost}"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_healthy
    networks:
      - app-network

  db:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    environment:
      POSTGRES_USER: "app_user"
      POSTGRES_PASSWORD: "${DB_PASSWORD:-app_pass}"
      POSTGRES_DB: "app_db"
      PGDATA: "/var/lib/postgresql/data"
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --locale=C"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app_user -d app_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - app-network

  cache:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
      - ./redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    environment:
      REDIS_PASSWORD: "${REDIS_PASSWORD:-}"
      REDIS_MAXMEMORY: "256mb"
      REDIS_MAXMEMORY_POLICY: "allkeys-lru"
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - app-network

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: backend:latest
    command: celery -A app.tasks worker --loglevel=info --concurrency=4
    volumes:
      - ./backend/app:/app
    environment:
      DATABASE_URL: "postgresql+asyncpg://app_user:${DB_PASSWORD:-app_pass}@db:5432/app_db"
      REDIS_URL: "redis://:${REDIS_PASSWORD:-}@cache:6379/0"
      CELERY_BROKER_URL: "redis://:${REDIS_PASSWORD:-}@cache:6379/1"
      CELERY_RESULT_BACKEND: "redis://:${REDIS_PASSWORD:-}@cache:6379/2"
      CELERY_WORKER_CONCURRENCY: "4"
      CELERY_TASK_ACKS_LATE: "true"
      CELERY_TASK_REJECT_ON_WORKER_LOST: "true"
      SECRET_KEY: "${SECRET_KEY:-change-me-in-production}"
      APP_ENV: "${APP_ENV:-production}"
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.tasks inspect ping -d celery@\$HOSTNAME || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 30s
    depends_on:
      cache:
        condition: service_healthy
      db:
        condition: service_healthy
      backend:
        condition: service_started
    networks:
      - app-network

volumes:
  pgdata:
    driver: local
  redis-data:
    driver: local

networks:
  app-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16