version: "3.8"

volumes:
  pgdata:
  redisdata:

networks:
  app-network:
    driver: bridge

services:
  db:
    image: postgres:16-alpine
    container_name: app-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - app-network
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
      POSTGRES_DB: appdb
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "app", "-d", "appdb"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  cache:
    image: redis:7-alpine
    container_name: app-cache
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  backend:
    image: python:3.12-slim
    container_name: app-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./backend/:/app
      - ./backend/requirements.txt:/app/requirements.txt
    working_dir: /app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - app-network
    environment:
      DATABASE_URL: postgresql+asyncpg://app:${DB_PASSWORD:-secret}@db:5432/appdb
      REDIS_URL: redis://cache:6379/0
      CELERY_BROKER_URL: redis://cache:6379/0
      CELERY_RESULT_BACKEND: redis://cache:6379/0
      PYTHONPATH: /app
      APP_ENV: ${APP_ENV:-development}
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

  worker:
    image: python:3.12-slim
    container_name: app-worker
    restart: unless-stopped
    volumes:
      - ./backend/:/app
      - ./backend/requirements.txt:/app/requirements.txt
    working_dir: /app
    command: celery -A tasks worker --loglevel=info
    networks:
      - app-network
    environment:
      DATABASE_URL: postgresql+asyncpg://app:${DB_PASSWORD:-secret}@db:5432/appdb
      REDIS_URL: redis://cache:6379/0
      CELERY_BROKER_URL: redis://cache:6379/0
      CELERY_RESULT_BACKEND: redis://cache:6379/0
      PYTHONPATH: /app
      APP_ENV: ${APP_ENV:-development}
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_healthy
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "celery", "-A", "tasks", "inspect", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://backend:8000
    image: app-frontend
    container_name: app-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - app-network
    environment:
      VITE_API_URL: http://backend:8000
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s