version: '3.8'

networks:
  appnet:
    driver: bridge

volumes:
  db-data:
  certbot-certs:
  webroot:

services:
  db:
    image: postgres:16-alpine
    container_name: myapp-db
    restart: unless-stopped
    networks:
      - appnet
    volumes:
      - db-data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    healthcheck:
      test: ["'CMD-SHELL'", "'pg_isready -U ${DB_USER} -d ${DB_NAME} || exit 1'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: myapp-app
    restart: unless-stopped
    networks:
      - appnet
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: ${PORT:-3000}
      DB_HOST: db
      DB_PORT: ${DB_PORT:-5432}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_POOL_MIN: ${DB_POOL_MIN:-2}
      DB_POOL_MAX: ${DB_POOL_MAX:-10}
      DB_SSL: ${DB_SSL:-false}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LOG_FORMAT: ${LOG_FORMAT:-json}
      CORS_ORIGIN: ${CORS_ORIGIN}
      RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS:-60000}
      RATE_LIMIT_MAX: ${RATE_LIMIT_MAX:-100}
    healthcheck:
      test: ["'CMD'", "'node'", "'-e'", "'require(\"http\").get(\"http://localhost:3000/health\", r => { process.exit(r.statusCode === 200 ? 0 : 1) }).on(\"error\", () => process.exit(1))'"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 40s

  nginx:
    image: nginx:1.25-alpine
    container_name: myapp-nginx
    restart: unless-stopped
    networks:
      - appnet
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot-certs:/etc/letsencrypt:ro
      - webroot:/var/www/certbot
    depends_on:
      - app
    healthcheck:
      test: ["'CMD-SHELL'", "'nginx -t 2>/dev/null || exit 1'"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  certbot-init:
    image: certbot/certbot
    container_name: myapp-certbot-init
    profiles:
      - setup
    networks:
      - appnet
    volumes:
      - certbot-certs:/etc/letsencrypt
      - webroot:/var/www/certbot
    depends_on:
      - nginx
    entrypoint: >
      sh -c "certbot certonly --webroot -w /var/www/certbot -d ${SERVER_NAME}
      --non-interactive --agree-tos --email ${SSL_EMAIL:-admin@example.com} || true"