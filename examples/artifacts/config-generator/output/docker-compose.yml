services:
  db:
    image: postgres:16-alpine
    container_name: db
    restart: unless-stopped
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    env_file: ./env/db.env
    networks:
      - appnet
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \${DB_USER:-appuser} -d \${DB_NAME:-appdb}"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  app:
    build:
      context: ./app
      dockerfile: Dockerfile
    image: myapp:latest
    container_name: app
    restart: unless-stopped
    user: node
    working_dir: /app
    volumes:
      - ./app:/app
      - /app/node_modules
    env_file: ./env/app.env
    networks:
      - appnet
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  nginx:
    image: nginx:1.25-alpine
    container_name: nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./certbot/www:/var/www/certbot:ro
      - ./certbot/conf:/etc/letsencrypt:ro
    networks:
      - appnet
    depends_on:
      app:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  pgdata:

networks:
  appnet:
    driver: bridge