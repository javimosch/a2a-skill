version: "3.8"

services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./certbot/www:/var/www/certbot:ro
      - ./certbot/conf:/etc/letsencrypt:ro
    networks:
      - appnet
    depends_on:
      app:
        condition: service_healthy

  app:
    build: ./app
    env_file: .env
    networks:
      - appnet
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 15s

  db:
    image: postgres:16-alpine
    volumes:
      - db_data:/var/lib/postgresql/data
    env_file: .env
    networks:
      - appnet
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "myapp", "-d", "myapp"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  db_data:

networks:
  appnet:
    driver: bridge