<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz: Space Exploration</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    padding: 40px 20px;
  }
  .container {
    max-width: 720px;
    width: 100%;
  }
  h1 {
    color: #e0d8ff;
    font-size: 2.4rem;
    font-weight: 700;
    text-align: center;
    margin-bottom: 8px;
    letter-spacing: -0.02em;
  }
  .subtitle {
    color: #9890c8;
    text-align: center;
    margin-bottom: 36px;
    font-size: 1rem;
  }
  .card {
    background: rgba(255,255,255,0.06);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.10);
    border-radius: 16px;
    padding: 28px 32px;
    margin-bottom: 20px;
    transition: border-color 0.3s, box-shadow 0.3s;
  }
  .card.correct { border-color: #34d399; box-shadow: 0 0 20px rgba(52,211,153,0.15); }
  .card.wrong   { border-color: #f87171; box-shadow: 0 0 20px rgba(248,113,113,0.15); }
  .q-number {
    display: inline-block;
    background: rgba(255,255,255,0.08);
    color: #a7a0d4;
    font-size: 0.75rem;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 2px 12px;
    border-radius: 20px;
    margin-bottom: 12px;
  }
  .q-text {
    color: #f0edff;
    font-size: 1.1rem;
    font-weight: 500;
    line-height: 1.5;
    margin-bottom: 18px;
  }
  .options { display: flex; flex-direction: column; gap: 10px; }
  .options label {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 16px;
    border-radius: 10px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.07);
    cursor: pointer;
    transition: background 0.2s, border-color 0.2s;
    color: #d8d4f0;
    font-size: 0.95rem;
  }
  .options label:hover { background: rgba(255,255,255,0.08); }
  .options input[type="radio"] {
    appearance: none;
    width: 18px; height: 18px;
    border: 2px solid rgba(255,255,255,0.25);
    border-radius: 50%;
    flex-shrink: 0;
    transition: border-color 0.2s, background 0.2s;
    position: relative;
  }
  .options input[type="radio"]:checked {
    border-color: #818cf8;
    background: #818cf8;
    box-shadow: inset 0 0 0 4px #302b63;
  }
  .options .option-letter {
    font-weight: 600;
    color: #9890c8;
    min-width: 22px;
  }
  .btn-row { text-align: center; margin-top: 12px; }
  button {
    background: #818cf8;
    color: #fff;
    border: none;
    padding: 14px 48px;
    font-size: 1.05rem;
    font-weight: 600;
    border-radius: 12px;
    cursor: pointer;
    transition: background 0.2s, transform 0.15s;
    letter-spacing: 0.01em;
  }
  button:hover { background: #6d78f0; transform: translateY(-1px); }
  button:active { transform: translateY(0); }
  .result {
    display: none;
    text-align: center;
    padding: 16px;
    border-radius: 12px;
    margin-bottom: 20px;
    font-weight: 600;
    font-size: 1.1rem;
  }
  .result.show { display: block; }
  .result.pass { background: rgba(52,211,153,0.15); color: #6ee7b7; border: 1px solid rgba(52,211,153,0.3); }
  .result.fail { background: rgba(248,113,113,0.15); color: #fca5a5; border: 1px solid rgba(248,113,113,0.3); }
  .feedback {
    display: none;
    margin-top: 6px;
    font-size: 0.85rem;
    font-weight: 500;
  }
  .feedback.show { display: block; }
  .feedback.correct { color: #34d399; }
  .feedback.wrong   { color: #f87171; }
</style>
</head>
<body>
<div class="container">
  <h1>🚀 Space Exploration</h1>
  <p class="subtitle">Test your knowledge of humanity&#39;s journey beyond Earth</p>

  <div id="resultBox" class="result"></div>

  <div id="quiz"></div>

  <div class="btn-row">
    <button id="checkBtn">Check Answers</button>
  </div>
</div>

<script>
const quizData = [
  {
    question: "What was the name of the first human-made satellite to successfully orbit Earth?",
    options: ["Sputnik 1", "Explorer 1", "Vanguard 1", "Luna 1"],
    answer: 0
  },
  {
    question: "Which Apollo mission successfully landed the first humans on the Moon in July 1969?",
    options: ["Apollo 10", "Apollo 11", "Apollo 12", "Apollo 13"],
    answer: 1
  },
  {
    question: "What is the largest planet in our solar system?",
    options: ["Saturn", "Neptune", "Jupiter", "Uranus"],
    answer: 2
  },
  {
    question: "Which space telescope, launched in 1990, has provided iconic deep-space images and made countless discoveries?",
    options: ["Chandra", "Hubble", "James Webb", "Spitzer"],
    answer: 1
  },
  {
    question: "What is the name of the boundary at 100 km altitude that is internationally recognized as the edge of outer space?",
    options: ["Kármán line", "Van Allen belt", "Oort cloud", "Roche limit"],
    answer: 0
  }
];

const letters = ["A", "B", "C", "D"];
const quizEl = document.getElementById("quiz");
const resultBox = document.getElementById("resultBox");

quizData.forEach((q, i) => {
  const card = document.createElement("div");
  card.className = "card";
  card.id = "card" + i;

  const num = document.createElement("div");
  num.className = "q-number";
  num.textContent = "Question " + (i + 1);
  card.appendChild(num);

  const text = document.createElement("div");
  text.className = "q-text";
  text.textContent = q.question;
  card.appendChild(text);

  const opts = document.createElement("div");
  opts.className = "options";

  q.options.forEach((opt, j) => {
    const label = document.createElement("label");
    const radio = document.createElement("input");
    radio.type = "radio";
    radio.name = "q" + i;
    radio.value = j;

    const letterSpan = document.createElement("span");
    letterSpan.className = "option-letter";
    letterSpan.textContent = letters[j] + ")";

    label.appendChild(radio);
    label.appendChild(letterSpan);
    label.appendChild(document.createTextNode(" " + opt));
    opts.appendChild(label);
  });

  card.appendChild(opts);

  const feedback = document.createElement("div");
  feedback.className = "feedback";
  feedback.id = "fb" + i;
  card.appendChild(feedback);

  quizEl.appendChild(card);
});

document.getElementById("checkBtn").addEventListener("click", function() {
  let correct = 0;
  const total = quizData.length;

  quizData.forEach((q, i) => {
    const selected = document.querySelector(input[name=q' + i + ']:checked);
    const card = document.getElementById("card" + i);
    const fb = document.getElementById("fb" + i);

    card.classList.remove("correct", "wrong");
    fb.classList.remove("show", "correct", "wrong");

    if (selected) {
      const val = parseInt(selected.value);
      const allRadios = document.querySelectorAll(input[name=q' + i + ']);
      allRadios.forEach(r => r.disabled = true);

      if (val === q.answer) {
        card.classList.add("correct");
        correct++;
      } else {
        card.classList.add("wrong");
        fb.textContent = "✗ The correct answer is " + letters[q.answer] + ") " + q.options[q.answer];
        fb.className = "feedback show wrong";
        selected.parentElement.style.borderColor = "#f87171";
      }
    } else {
      card.classList.add("wrong");
      fb.textContent = "✗ No answer selected. The correct answer is " + letters[q.answer] + ") " + q.options[q.answer];
      fb.className = "feedback show wrong";
    }
  });

  resultBox.className = "result show " + (correct === total ? "pass" : "fail");
  resultBox.textContent = correct === total
    ? "🎉 Perfect! You got all " + total + " questions correct!"
    : "You got " + correct + " of " + total + " correct. Keep exploring!";
});
</script>
</body>
</html>
